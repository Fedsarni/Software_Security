version: '3.8'

networks:
  sms-network:
    driver: bridge

services:
  db:
    image: mysql:5.7
    platform: linux/amd64
    container_name: sms-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_secure
      MYSQL_DATABASE: sms_db
      MYSQL_USER: sms_user
      MYSQL_PASSWORD: sms_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sms-network

  web:
    build: ./web
    container_name: sms-web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - db
    networks:
      - sms-network

volumes:
  db_data:
